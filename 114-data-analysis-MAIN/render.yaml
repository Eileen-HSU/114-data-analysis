services:
  - type: web
    name: one14-data-analysis-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://one14-data-analysis-uhkg.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
