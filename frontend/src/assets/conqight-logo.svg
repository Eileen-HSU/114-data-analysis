<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1302 623" role="img" aria-labelledby="title desc">
  <title id="title">CON QIGHT logo</title>
  <desc id="desc">Lavender CON QIGHT wordmark with a magnifying-glass C, pink chart line, glossy orb, and underline.</desc>
  <defs>
    <linearGradient id="lavenderStroke" x1="0.05" y1="0.48" x2="0.92" y2="0.48">
      <stop offset="0" stop-color="#e5b8ff"/>
      <stop offset="0.55" stop-color="#e9c8ff"/>
      <stop offset="1" stop-color="#dfb5ff"/>
    </linearGradient>
    <linearGradient id="wordFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3d6ff"/>
      <stop offset="0.45" stop-color="#e3b8fb"/>
      <stop offset="1" stop-color="#d6a9f5"/>
    </linearGradient>
    <linearGradient id="pinkLine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d4748e"/>
      <stop offset="1" stop-color="#efa4b4"/>
    </linearGradient>
    <radialGradient id="orb" cx="0.42" cy="0.34" r="0.72">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.2" stop-color="#f4e2ff"/>
      <stop offset="0.55" stop-color="#c9b2e8"/>
      <stop offset="0.78" stop-color="#f3b4c0"/>
      <stop offset="1" stop-color="#8d77d0"/>
    </radialGradient>
    <filter id="softBlur" x="-18%" y="-18%" width="136%" height="136%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.8"/>
      <feOffset dx="0" dy="5" result="offset"/>
      <feColorMatrix in="offset" type="matrix" values="0 0 0 0 0.45 0 0 0 0 0.25 0 0 0 0 0.72 0 0 0 0.28 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1302" height="623" fill="none"/>

  <path
    d="M923 132C759 84 572 97 388 161 222 219 110 308 93 405 82 468 124 514 211 532c89 19 211 9 354-5"
    fill="none"
    stroke="url(#lavenderStroke)"
    stroke-width="58"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <path
    d="M902 132C734 98 551 115 381 176 232 230 130 313 120 399c-8 63 43 99 139 109 79 8 180 0 293-12"
    fill="none"
    stroke="#f3d8ff"
    stroke-width="11"
    stroke-linecap="round"
    opacity="0.55"
  />

  <path
    d="M545 470 665 596"
    fill="none"
    stroke="url(#lavenderStroke)"
    stroke-width="59"
    stroke-linecap="round"
  />

  <path
    d="M717 518c123-2 257-18 393-43"
    fill="none"
    stroke="url(#lavenderStroke)"
    stroke-width="40"
    stroke-linecap="round"
  />

  <g fill="url(#wordFill)" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="700">
    <text x="615" y="279" font-size="168" transform="skewX(-11)">ON</text>
    <text x="618" y="462" font-size="165" transform="skewX(-11)">GHT</text>
  </g>

  <path
    d="M255 414 314 444 374 410 372 320 430 258 528 266 612 303"
    fill="none"
    stroke="url(#pinkLine)"
    stroke-width="11"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <path
    d="M390 342c62-45 157-44 216 26"
    fill="none"
    stroke="#df8fa3"
    stroke-width="10"
    stroke-linecap="round"
    opacity="0.9"
  />
  <g fill="url(#pinkLine)" filter="url(#softBlur)">
    <ellipse cx="254" cy="414" rx="24" ry="17" transform="rotate(20 254 414)"/>
    <ellipse cx="314" cy="444" rx="24" ry="17" transform="rotate(-10 314 444)"/>
    <ellipse cx="374" cy="410" rx="24" ry="17" transform="rotate(-15 374 410)"/>
    <ellipse cx="372" cy="320" rx="24" ry="17" transform="rotate(-12 372 320)"/>
    <ellipse cx="430" cy="258" rx="25" ry="17" transform="rotate(8 430 258)"/>
    <ellipse cx="528" cy="266" rx="25" ry="17" transform="rotate(8 528 266)"/>
    <ellipse cx="612" cy="303" rx="25" ry="17" transform="rotate(14 612 303)"/>
  </g>

  <g filter="url(#softBlur)">
    <ellipse cx="502" cy="383" rx="96" ry="60" transform="rotate(-12 502 383)" fill="url(#orb)"/>
    <ellipse cx="505" cy="384" rx="84" ry="48" transform="rotate(-12 505 384)" fill="#d6c0ee" opacity="0.28"/>
    <ellipse cx="469" cy="354" rx="36" ry="13" transform="rotate(-15 469 354)" fill="#fff8ff" opacity="0.78"/>
    <ellipse cx="540" cy="355" rx="12" ry="7" fill="#fff8ff" opacity="0.55"/>
    <ellipse cx="553" cy="366" rx="10" ry="6" fill="#fff8ff" opacity="0.45"/>
  </g>
</svg>
