<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 690 345" role="img" aria-labelledby="title desc">
  <title id="title">CON QIGHT logo</title>
  <desc id="desc">Lavender CON QIGHT wordmark with a magnifying glass, pink chart line, and glossy orb.</desc>
  <defs>
